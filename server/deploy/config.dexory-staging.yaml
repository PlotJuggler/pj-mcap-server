# pj-cloud-server — S3-use-case STAGING bucket (real AWS S3).
# arn:aws:s3:::dexory-data-offload-staging-bucket
#
# CREDENTIALS ARE NOT IN THIS FILE (it is committed). Resolution order:
#   access_key/secret_key are left empty -> storage.NewS3 falls back to the
#   AWS default credential chain: AWS_ACCESS_KEY_ID/AWS_SECRET_ACCESS_KEY env,
#   then ~/.aws/credentials (use AWS_PROFILE to pick a profile), then IAM role.
#   See scripts/RUNBOOK.md "Real AWS staging bucket".
#
# The explicit EMPTY endpoint/access_key/secret_key below are LOAD-BEARING:
# the loader overlays this YAML onto config.Default(), which is the Minio dev
# profile (endpoint http://localhost:9000, static creds admin/password123).
# An ABSENT key keeps the Minio default; only a present-but-empty key clears
# it. Empty endpoint = real AWS S3 with virtual-hosted addressing (path-style
# is Minio-only — see storage/s3.go); empty access_key = the AWS default
# credential chain.
#
# The connector only READS the bucket (List/Head/GetRange). It never writes.

server:
  listen: ":8084"          # staging instance; dev :8080 / smoke :8081 / matrix :8082 / 3d-demo :8083 stay untouched

auth:
  bearer_token: ${PJ_CLOUD_TOKEN}   # fail-closed: unset => server won't start unless PJ_CLOUD_ALLOW_ANONYMOUS=1

format: mcap

storage:
  s3:
    bucket: dexory-data-offload-staging-bucket
    # Region verified on first contact 2026-06-10 (x-amz-bucket-region).
    region: eu-west-2
    # The bucket is a Hive-partitioned data lake (customer=<x>/customer_site=<y>/
    # robot=<z>/source=<s>/date=<d>/...). An UNSCOPED scan lists every customer's
    # data plus the ~20MB _lakeview_index snapshots and blows the 120s scan
    # budget — ALWAYS scope the connector to an MCAP partition. MCAPs live under
    # source=ros-bags/ (~22MB each) and source=low-fat-bags/ (~5.5MB each).
    # First-contact scope: one robot, one day (34 files). Widen deliberately.
    prefix: "customer=dexory/customer_site=nashville/robot=arri-182/source=ros-bags/date=2026-05-19/"
    endpoint: ""           # MUST stay present-and-empty: clears the Minio default
    access_key: ""         # MUST stay present-and-empty: default credential chain
    secret_key: ""

catalog:
  db_path: /tmp/pj-cloud-dexory-staging.db

indexer:
  poll_interval: 60s
  startup_scan: true
  # WAN budget: real-bucket extraction measured ~7-12s/file from this network
  # (vs milliseconds on localhost Minio); 34 files needs ~6min — give headroom.
  warm_start_timeout: 20m
