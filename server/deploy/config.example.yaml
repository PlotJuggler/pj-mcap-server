# pj-cloud-server example config (Plan A Task 36 / design spec §8.6).
# Field names match config.go exactly; ${ENV_VAR} refs are expanded at load.
#
# Run plaintext for dev by omitting server.tls; set BOTH cert and key for TLS
# (wss:// + https dashboard). A self-signed localhost pair is produced by
# scripts/gen-dev-cert.sh.

server:
  listen: ":8443"
  tls:
    cert: /etc/pj-cloud/server.crt
    key:  /etc/pj-cloud/server.key
  # response_compression: opt-in ZSTD compression of BULKY catalog RPC responses
  # (ListFiles / GetVocabulary / GetFile / OpenSession / UpdateTags) — a client
  # negotiates it in its Hello, and only responses that clear the threshold AND
  # actually shrink are wrapped. Transport-level (applies to catalog-only
  # connections too), distinct from the session batch-body compression below.
  # Session MessageBatch bodies are already ZSTD-framed and are never re-wrapped.
  # Defaults shown; the whole block may be omitted to keep them.
  response_compression:
    enabled: true                        # false => the server never wraps a response
    level: 1                             # zstd level for RPC bodies (1 = fastest; these bodies compress well anyway)
    threshold_bytes: 4096                # responses smaller than this are sent raw
    concurrency: 4                       # shared encoder worker pool

auth:
  # Auth is FAIL-CLOSED: with no bearer token the server REFUSES to start. Set the
  # env var (do NOT inline secrets). To run with NO authentication on purpose
  # (local dev only), start with -allow-anonymous or PJ_CLOUD_ALLOW_ANONYMOUS=1.
  bearer_token: ${PJ_CLOUD_TOKEN}

format: mcap                              # v1 supports only "mcap"

# storage is a TAGGED UNION: this slice ships the s3 backend (Minio / AWS S3).
storage:
  s3:
    bucket: recordings
    region: us-east-1
    prefix: ""                            # optional key prefix
    endpoint: http://minio:9000           # uncomment/edit for self-hosted S3 / Minio
    access_key: ${PJ_CLOUD_S3_ACCESS_KEY} # optional static creds (Minio dev)
    secret_key: ${PJ_CLOUD_S3_SECRET_KEY}

catalog:
  db_path: /var/lib/pj-cloud/catalog.db
  # tag_ipc_socket (D2, CATALOG_CONTRACT.md §10): the Python mcap_catalog
  # builder's tag-edit UNIX socket. Required for UpdateTags to work at all —
  # the catalog is always read-only now, so this IPC call is the only path a
  # tag edit can take. MUST be on a SHARED LOCAL volume with the builder (see
  # server/deploy/README.md's "Two-process deployment" section) — never NFS/EFS.
  tag_ipc_socket: /var/lib/pj-cloud/tag.sock

# indexer: removed in M6 §2.6 — the in-process Go catalog writer/indexer this
# tuned no longer exists; the catalog is built by the external Python
# mcap_catalog builder (server/deploy/Dockerfile.builder /
# pj-cloud-builder.service) and served read-only.

session:
  max_concurrent: 16
  retain_after_disconnect: 60s
  retain_max_seqs: 256
  retain_max_bytes: 67108864             # 64 MB
  max_batch_bytes: 524288                # 512 KB
  max_batch_age: 50ms
  max_message_bytes: 16777216           # 16 MB
  compress_threshold_bytes: 4096
  body_zstd_level: 3

dashboard:
  enabled: true
  basic_auth:
    username: admin
    password: ${PJ_CLOUD_DASHBOARD_PASSWORD}   # empty env var DISABLES the dashboard

metrics:
  enabled: true
  require_auth: false                    # /metrics unauthenticated by default
