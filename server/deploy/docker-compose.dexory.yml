# DEXORY S3 deploy — the two-process backend against the real AWS bucket, no
# Minio. Derived from docker-compose.yml (the local-dev stack) by: dropping the
# minio/minio-init services, pointing both services at real S3, and taking
# credentials from the EC2 instance IAM role (no static keys on the box).
#
# This is DEXORY-SPECIFIC (bucket/region/prefix below). Asensus is a separate
# GCS deploy. Full walkthrough: docs/ec2-deploy.md.
#
# USAGE (on the EC2 box, from server/deploy/):
#   PJ_CLOUD_TOKEN=<token> docker compose -f docker-compose.dexory.yml up -d --build
#   docker compose -f docker-compose.dexory.yml logs -f builder    # watch the first catalog build
#   curl -fsS http://localhost:8080/health                          # -> ok once the catalog lands
#
# ARCHITECTURE (unchanged from the base compose — read that file's header for the
# full rationale): two services share ONE local named volume (`catalog-data`,
# the SQLite DB + tag-edit socket) which MUST be local, never EFS/NFS. `builder`
# is the sole catalog writer + tag-edit IPC server; `server` reads it read-only.
# `server` is gated on `builder`'s healthcheck (build_metadata.last_build_ns > 0)
# so it never starts before the first catalog is published.
#
# CREDENTIALS: no AWS_ACCESS_KEY_ID/SECRET here — both containers use the EC2
# instance IAM role via IMDS. That REQUIRES the instance metadata hop limit set
# to 2 (a container is one extra network hop); see docs/ec2-deploy.md §1.
services:
  builder:
    build:
      context: ../..                 # repo root: needs mcap_catalog/ (sibling of server/)
      dockerfile: server/deploy/Dockerfile.builder
    image: pj-cloud-builder:dexory
    environment:
      AWS_REGION: eu-west-2
      AWS_DEFAULT_REGION: eu-west-2
    volumes:
      - catalog-data:/var/lib/pj-cloud
    command:
      - "--source=s3"
      - "--s3-bucket=dexory-data-offload-staging-bucket"
      # Same partition scope as config.dexory-ec2.yaml's storage.s3.prefix —
      # keep the two in sync when you widen it.
      - "--s3-prefix=customer=dexory/customer_site=nashville/robot=arri-182/source=ros-bags/date=2026-05-19/"
      - "--no-watch"
      - "--tag-socket=/var/lib/pj-cloud/tag.sock"
      - "--db=/var/lib/pj-cloud/catalog.db"
      - "--rescan-interval=300"
      - "--log-level=INFO"
    healthcheck:
      test: ["CMD", "python3", "-c", "import sqlite3,sys; c=sqlite3.connect('file:/var/lib/pj-cloud/catalog.db?mode=ro', uri=True); row=c.execute('SELECT last_build_ns FROM build_metadata WHERE id=1').fetchone(); sys.exit(0 if row and row[0] and row[0] > 0 else 1)"]
      interval: 5s
      timeout: 3s
      retries: 240                   # up to ~20 min for a cold WAN first scan
      start_period: 5s
    restart: unless-stopped

  server:
    build:
      context: ..                    # the server/ module (Dockerfile at deploy/Dockerfile)
      dockerfile: deploy/Dockerfile
    image: pj-cloud-server:dexory
    depends_on:
      builder:
        condition: service_healthy   # waits for the builder's FIRST published catalog
    environment:
      # Auth is FAIL-CLOSED: with no token the server refuses to start. Set a
      # token, or opt into no-auth on purpose with PJ_CLOUD_ALLOW_ANONYMOUS=1.
      PJ_CLOUD_TOKEN: ${PJ_CLOUD_TOKEN:-}                       # unset => server won't start (unless allow-anonymous)
      PJ_CLOUD_ALLOW_ANONYMOUS: ${PJ_CLOUD_ALLOW_ANONYMOUS:-}   # "1" => run with NO authentication (never on a public port)
      PJ_CLOUD_DASHBOARD_PASSWORD: ${PJ_CLOUD_DASHBOARD_PASSWORD:-}   # empty => dashboard disabled
      AWS_REGION: eu-west-2
      AWS_DEFAULT_REGION: eu-west-2
    ports:
      - "8080:8080"                  # plaintext ws:// + http dashboard/health/metrics
    volumes:
      - ./config.dexory-ec2.yaml:/etc/pj-cloud/config.yaml:ro
      - catalog-data:/var/lib/pj-cloud
    command:
      - "--config=/etc/pj-cloud/config.yaml"
    # No container healthcheck: the distroless/static image has no shell/curl —
    # probe externally: curl -fsS http://localhost:8080/health
    restart: unless-stopped

volumes:
  catalog-data:
