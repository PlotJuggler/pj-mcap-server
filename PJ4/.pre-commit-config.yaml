exclude: ^.vscode/|^deps/|^build/|^3rdparty/
repos:

  # Standard hooks
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v4.5.0
    hooks:
      - id: check-added-large-files
      - id: check-ast
      - id: check-case-conflict
      - id: check-merge-conflict
      - id: check-symlinks
      - id: check-xml
      - id: check-yaml
        exclude: .gitlab-ci.yml
      - id: debug-statements
      - id: end-of-file-fixer
        exclude_types: [svg]
      - id: mixed-line-ending
      - id: trailing-whitespace
        exclude_types: [svg]
      - id: fix-byte-order-marker

  # Custom hooks
  - repo: local
    hooks:
      - id: check-forbidden-patterns
        name: Check for forbidden patterns (std::getenv, etc.)
        entry: .pre-commit-scripts/check-forbidden-patterns.py
        language: python
        types_or: [c++, c]

  # CPP hooks
  - repo: https://github.com/pre-commit/mirrors-clang-format
    rev: v22.1.0
    hooks:
      - id: clang-format
        types_or: [c++, c]
        args: ['-fallback-style=none', '-i']
