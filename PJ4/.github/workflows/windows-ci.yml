name: Windows CI

on:
  pull_request:
    branches: [main, development]
    types: [opened, synchronize, reopened, ready_for_review]
  push:
    branches: [main, development]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  pre-commit:
    if: github.event.pull_request.draft == false
    uses: ./.github/workflows/pre-commit.yml
    permissions:
      contents: read

  build:
    if: github.event.pull_request.draft == false
    needs: pre-commit
    runs-on: windows-latest
    # PJ4 v1 is Linux-only by policy (see CLAUDE.md). This job runs as a
    # portability tracker: it surfaces POSIX-isms early without blocking
    # PRs while the codebase converges on cross-platform cleanliness.
    continue-on-error: true
    # Backstop against hangs (a deadlocked test otherwise holds the runner for
    # GitHub's 6-hour default). Worst observed legitimate run — cold sccache —
    # is ~59 min.
    timeout-minutes: 90
    permissions:
      contents: read
      packages: write   # push/pull the Conan cache OCI artifact on ghcr.io

    env:
      # Pin sccache's object cache to a known path so actions/cache can persist
      # it across runs (see the "Restore/Save sccache cache" steps). Without a
      # persisted cache, sccache's local disk starts empty every run — a 0% hit
      # rate that forces all ~585 translation units to recompile cold (~30 min).
      # SCCACHE_CACHE_SIZE bounds the dir so the cached artifact stays well under
      # the 10 GB Actions-cache budget shared with the Conan/Qt caches.
      SCCACHE_DIR: ${{ github.workspace }}/.sccache
      SCCACHE_CACHE_SIZE: "2G"

    steps:
      - name: Use HTTPS for github.com submodules
        shell: bash
        run: git config --global url."https://github.com/".insteadOf "git@github.com:"

      - uses: actions/checkout@v6
        with:
          submodules: recursive

      - uses: conan-io/setup-conan@v1
        with:
          # Backed by ghcr.io via oras (see steps below) instead of
          # actions/cache (10 GB soft cap, 7-day eviction, branch-scoped).
          # ghcr.io public repos: unlimited storage, tags survive forever,
          # cross-branch.
          cache_packages: false

      - name: Setup oras (OCI Registry As Storage)
        # Primary install path. continue-on-error so a 5xx on the github.com
        # release CDN doesn't kill CI — we have a fallback below, and worst
        # case we degrade to "no Conan cache this run" (build still completes).
        id: setup_oras
        uses: oras-project/setup-oras@v1
        continue-on-error: true

      - name: Setup oras (manual download fallback)
        # Only fires if setup-oras failed. Re-download from the same release
        # URL but with longer exponential backoff (5 retries) — covers brief
        # 5xx blips that exceed the action's built-in retry budget.
        id: setup_oras_fallback
        if: steps.setup_oras.outcome == 'failure'
        continue-on-error: true
        shell: pwsh
        run: |
          $version = "1.3.0"
          $url = "https://github.com/oras-project/oras/releases/download/v$version/oras_${version}_windows_amd64.zip"
          $zip = Join-Path $env:RUNNER_TEMP "oras.zip"
          $installDir = Join-Path $env:RUNNER_TEMP "oras-bin"
          New-Item -ItemType Directory -Force -Path $installDir | Out-Null

          $attempts = 0
          while ($attempts -lt 5) {
            try {
              Invoke-WebRequest -Uri $url -OutFile $zip -UseBasicParsing
              break
            } catch {
              $attempts++
              if ($attempts -ge 5) { throw }
              $delay = [math]::Pow(2, $attempts) * 5
              Write-Host "Download attempt $attempts failed: $_. Retry in ${delay}s..."
              Start-Sleep -Seconds $delay
            }
          }
          Expand-Archive -Path $zip -DestinationPath $installDir -Force
          "$installDir" | Out-File -FilePath $env:GITHUB_PATH -Append
          & "$installDir\oras.exe" version

      - name: Compute Conan cache tag
        id: conan_cache
        shell: pwsh
        run: |
          $hash = (Get-FileHash conanfile.txt -Algorithm SHA256).Hash.Substring(0, 16).ToLower()
          $owner = "${{ github.repository_owner }}".ToLower()
          $tag = "ghcr.io/$owner/pj4-conan-cache:windows-msvc-relwithdebinfo-$hash"
          "hash=$hash" | Out-File -FilePath $env:GITHUB_OUTPUT -Append
          "tag=$tag" | Out-File -FilePath $env:GITHUB_OUTPUT -Append
          Write-Host "Cache tag: $tag"

      - name: Login to ghcr.io
        if: github.repository_owner == 'PlotJuggler' && (steps.setup_oras.outcome == 'success' || steps.setup_oras_fallback.outcome == 'success')
        shell: pwsh
        env:
          GHCR_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          $env:GHCR_TOKEN | oras login ghcr.io -u $env:GITHUB_ACTOR --password-stdin

      - name: Restore Conan cache from ghcr.io
        if: github.repository_owner == 'PlotJuggler' && (steps.setup_oras.outcome == 'success' || steps.setup_oras_fallback.outcome == 'success')
        shell: pwsh
        run: |
          $tag = "${{ steps.conan_cache.outputs.tag }}"
          $pullDir = Join-Path $env:RUNNER_TEMP "conan-cache-pull"
          New-Item -ItemType Directory -Force -Path $pullDir | Out-Null
          Push-Location $pullDir
          try {
            oras pull $tag 2>&1 | Out-Host
            $pulled = $LASTEXITCODE
          } finally {
            Pop-Location
          }
          $tarball = Join-Path $pullDir "conan-cache.tar.zst"
          if ($pulled -eq 0 -and (Test-Path $tarball)) {
            Write-Host "Cache HIT: extracting $tarball"
            New-Item -ItemType Directory -Force -Path "$env:USERPROFILE\.conan2" | Out-Null
            tar --zstd -xf $tarball -C $env:USERPROFILE
            "CONAN_CACHE_HIT=1" | Out-File -FilePath $env:GITHUB_ENV -Append
          } else {
            Write-Host "Cache MISS for $tag (cold start or first build of this conanfile)"
          }
          # Reset exit code so a missing tag doesn't fail the step
          $global:LASTEXITCODE = 0

      - name: Restore Conan cache from GitHub Actions cache
        # Fallback layer under the ghcr.io cache above (same rationale as the
        # Linux job): ghcr.io only restores on the canonical PlotJuggler repo and
        # only saves on push-to-main, so PRs that touch conanfile.txt and all
        # fork builds rebuild every Conan dep from source. The native Actions
        # cache works on PRs/forks with no token and fills that gap. Skipped when
        # ghcr.io already produced a HIT — %USERPROFILE%\.conan2 is populated.
        id: conan-gha-cache
        if: env.CONAN_CACHE_HIT != '1'
        uses: actions/cache/restore@v5
        with:
          path: ~/.conan2
          key: conan-windows-msvc-relwithdebinfo-${{ steps.conan_cache.outputs.hash }}
          restore-keys: |
            conan-windows-msvc-relwithdebinfo-

      - name: Cache Qt
        id: qt-cache
        uses: actions/cache@v5
        with:
          path: .qt
          key: qt-6.8.3-windows-msvc2022_64-qtcharts-qtwebsockets

      - name: Install Qt 6.8.3 via aqt
        if: steps.qt-cache.outputs.cache-hit != 'true'
        shell: bash
        run: |
          pip install aqtinstall
          aqt install-qt windows desktop 6.8.3 win64_msvc2022_64 \
            --modules qtcharts qtwebsockets --outputdir ./.qt

      - name: Install sccache
        # sccache is a compile-cache speedup, NOT load-bearing: the build is
        # correct without it, just slower. So this step must never fail the run.
        # `version` is pinned because the default `latest` does a GitHub API
        # release lookup that intermittently returns undefined ("Unable to
        # locate executable file: undefined") and was red-X'ing this job — and
        # main's — for builds that have nothing to do with sccache.
        # continue-on-error + the outcome gate in Build mirror the graceful
        # degradation already used for oras above.
        id: setup_sccache
        continue-on-error: true
        uses: mozilla-actions/sccache-action@v0.0.9
        with:
          version: "v0.8.2"

      - name: Restore sccache cache
        # The decisive Windows-CI speedup. With a warm cache, almost all ~585
        # translation units become cache fetches instead of cold MSVC compiles,
        # cutting the Build step from ~30 min to a few minutes. Rolling key
        # (per-SHA) + prefix restore-keys: each run restores the most recent
        # cache and the Save step persists a fresh superset, so the warm set
        # accumulates run over run. Same within-PR scope that already lets the
        # Conan GHA cache below hit across synchronize events.
        id: sccache-cache
        uses: actions/cache/restore@v5
        with:
          path: ${{ github.workspace }}/.sccache
          key: sccache-windows-msvc-relwithdebinfo-${{ github.sha }}
          restore-keys: |
            sccache-windows-msvc-relwithdebinfo-

      - name: Setup MSVC environment
        # Loads cl.exe / link.exe / rc.exe etc. into PATH so the Ninja
        # generator can find them. The VS generator did this implicitly;
        # Ninja does not.
        uses: ilammy/msvc-dev-cmd@v1
        with:
          arch: x64

      - name: Build
        shell: bash
        env:
          # sccache uses its LOCAL-DISK cache (relocated to SCCACHE_DIR at job
          # level) which the "Restore/Save sccache cache" steps persist across
          # runs via actions/cache. We intentionally do NOT set
          # SCCACHE_GHA_ENABLED: sccache 0.8.2's native GHA backend needs
          # ACTIONS_CACHE_URL, a legacy runner env var GitHub retired in favor
          # of the v2 cache service, so enabling it makes the sccache server
          # fail to start ("ACTIONS_CACHE_URL not found") and every compile dies
          # with exit 2. Persisting the local-disk dir ourselves sidesteps that
          # while still giving cross-run compiler caching (the Conan third-party
          # closure is cached separately by the ghcr.io / actions cache steps).
          #
          # "true" only if the install step actually succeeded; gates the
          # compiler-launcher wiring below so a flaked sccache install degrades
          # to an uncached (but correct) build instead of failing.
          SCCACHE_AVAILABLE: ${{ steps.setup_sccache.outcome == 'success' }}
        run: |
          QT_DIR="$(pwd)/.qt/6.8.3/msvc2022_64"
          if [[ ! -d "$QT_DIR" ]]; then
            echo "::error::Qt 6.8.3 not found at $QT_DIR"
            exit 1
          fi

          conan profile detect --force
          # Tell Conan to generate a Ninja-compatible toolchain. Without this
          # override Conan auto-picks "Visual Studio 17 2022" and stamps the
          # toolchain with CMAKE_GENERATOR_PLATFORM=x64 + CMAKE_GENERATOR_TOOLSET=v143.
          # Then our `cmake -G "Ninja Multi-Config"` below errors with:
          #   Generator Ninja Multi-Config does not support platform specification,
          #   but platform x64 was specified.
          conan install . --output-folder=build --build=missing \
            -s build_type=RelWithDebInfo -s compiler.cppstd=20 \
            -c tools.cmake.cmaketoolchain:generator="Ninja Multi-Config"

          # Use Ninja Multi-Config so sccache is actually invoked: CMake's
          # CMAKE_<LANG>_COMPILER_LAUNCHER is honored by the Ninja and
          # Makefile generators only — the Visual Studio (MSBuild) generator
          # silently ignores it, which is why prior runs showed "Compile
          # requests: 0" in sccache --show-stats.
          #
          # CMAKE_MSVC_DEBUG_INFORMATION_FORMAT=Embedded forces /Z7 instead
          # of /Zi for RelWithDebInfo. /Zi writes to a shared PDB via
          # mspdbsrv.exe which sccache cannot cache; /Z7 embeds debug info
          # in each .obj and is fully cacheable.
          #
          # CMAKE_POLICY_DEFAULT_CMP0141=NEW is required for CMake to honor
          # CMAKE_MSVC_DEBUG_INFORMATION_FORMAT at all. The variable was added
          # in CMake 3.25 behind policy CMP0141; without NEW, CMake silently
          # falls back to the legacy /Zi flag — which is what causes parallel
          # cl.exe workers to race on pj_base.pdb (fatal C1041). We can't bump
          # cmake_minimum_required past 3.22 because Ubuntu 22.04 LTS ships
          # CMake 3.22.1, so the opt-in lives here in the CI invocation.
          # Only route the compiler through sccache if its install succeeded.
          # /Z7 (Embedded debug info) below stays on regardless: it also avoids
          # the parallel-cl.exe pj_base.pdb race, so it's correct with or
          # without the cache.
          launcher_args=()
          if [[ "$SCCACHE_AVAILABLE" == "true" ]]; then
            launcher_args=(-DCMAKE_C_COMPILER_LAUNCHER=sccache \
                           -DCMAKE_CXX_COMPILER_LAUNCHER=sccache)
          else
            echo "::warning::sccache unavailable; building without a compiler cache"
          fi

          cmake -S . -B build -G "Ninja Multi-Config" \
            -DCMAKE_TOOLCHAIN_FILE="build/conan_toolchain.cmake" \
            -DCMAKE_PREFIX_PATH="$QT_DIR" \
            -DCMAKE_POLICY_DEFAULT_CMP0141=NEW \
            -DCMAKE_MSVC_DEBUG_INFORMATION_FORMAT=Embedded \
            "${launcher_args[@]}"

          cmake --build build --config RelWithDebInfo --parallel

          # Surface sccache stats before the post-action does, so they
          # appear in the Build step's log next to the compile output.
          if [[ "$SCCACHE_AVAILABLE" == "true" ]]; then
            sccache --show-stats
            # Flush the on-disk cache and release file handles so the
            # "Save sccache cache" step archives a complete, consistent dir.
            sccache --stop-server || true
          fi

      - name: Save sccache cache
        # Persist the now-warm compiler cache for the next run. always() so a
        # partial cache from a failed compile is still saved (a continue-on-error
        # job means the build may not succeed); the cache-hit guard skips the
        # no-op save when this exact SHA's cache already exists (keys are
        # immutable). On a prefix-only restore (the normal synchronize case)
        # cache-hit is false, so a fresh superset is saved.
        if: always() && steps.sccache-cache.outputs.cache-hit != 'true'
        uses: actions/cache/save@v5
        with:
          path: ${{ github.workspace }}/.sccache
          key: sccache-windows-msvc-relwithdebinfo-${{ github.sha }}

      - name: Save Conan cache to ghcr.io
        # Only push from the canonical repo on real pushes (forks lack write
        # access to ghcr.io packages). Skip on cache HIT — the tag content is
        # already up to date, no point re-uploading the same bytes.
        # `!cancelled()` lets us save the cache even when the project compile
        # step (`cmake --build`) fails — Conan deps finished long before, so
        # the cache is fully populated and worth preserving for the next run.
        if: |
          !cancelled() &&
          github.event_name == 'push' &&
          github.repository == 'PlotJuggler/PJ4' &&
          env.CONAN_CACHE_HIT != '1' &&
          (steps.setup_oras.outcome == 'success' || steps.setup_oras_fallback.outcome == 'success')
        shell: pwsh
        run: |
          $tag = "${{ steps.conan_cache.outputs.tag }}"
          $tarball = Join-Path $env:RUNNER_TEMP "conan-cache.tar.zst"

          # Trim build trees before packing so the uploaded artifact only
          # contains the package binaries consumers actually need.
          conan cache clean "*" --build --source --temp

          Write-Host "Packing ~/.conan2 -> $tarball"
          tar --zstd -cf $tarball -C $env:USERPROFILE .conan2

          $size = (Get-Item $tarball).Length / 1MB
          Write-Host ("Compressed cache size: {0:N1} MB" -f $size)

          Push-Location $env:RUNNER_TEMP
          try {
            oras push $tag "conan-cache.tar.zst:application/vnd.oci.image.layer.v1.tar+zstd"
          } finally {
            Pop-Location
          }

      - name: Trim Conan cache before saving
        # Drop build/source/temp trees so only the package binaries are persisted
        # (matches the ghcr.io save above). Runs only when about to save a fresh
        # GHA cache entry.
        if: always() && env.CONAN_CACHE_HIT != '1' && steps.conan-gha-cache.outputs.cache-hit != 'true'
        shell: pwsh
        run: conan cache clean "*" --build --source --temp; $global:LASTEXITCODE = 0

      - name: Save Conan cache to GitHub Actions cache
        # Persist the built closure under the exact conanfile hash so the next
        # run on this branch (or any identically-keyed branch) restores it.
        # `always()` so a failing project compile still saves the third-party
        # deps that finished earlier. Skipped on a ghcr.io HIT or exact GHA-key
        # hit: %USERPROFILE%\.conan2 is already current and GHA keys are immutable.
        if: always() && env.CONAN_CACHE_HIT != '1' && steps.conan-gha-cache.outputs.cache-hit != 'true'
        uses: actions/cache/save@v5
        with:
          path: ~/.conan2
          key: conan-windows-msvc-relwithdebinfo-${{ steps.conan_cache.outputs.hash }}

      - name: Test
        # Prepend Qt's and FFmpeg's bin/ dirs to PATH so the OS loader can resolve
        # their DLLs (Qt6Core.dll, avcodec/avformat/avutil/swscale) when ctest
        # launches the test executables. Without this they exit 0xC0000135
        # (STATUS_DLL_NOT_FOUND) before any test code runs.
        shell: bash
        run: |
          export PATH="$(pwd)/.qt/6.8.3/msvc2022_64/bin:$PATH"
          # FFmpeg's Conan bin dir(s) are emitted at configure time by
          # pj_scene2D/core/CMakeLists.txt (Conan's package path is hashed and not
          # knowable here). Prepend each so every exe that transitively links
          # pj_scene2d_core resolves the FFmpeg DLLs — covers all such tests at once,
          # no per-target list.
          #
          # DEFERRED: a shipped Windows pj_app.exe needs these same 4 DLLs at startup.
          # PJ4 v1 is Linux-only and this job is a non-blocking portability tracker,
          # so real packaging (windeployqt + bundling the FFmpeg DLLs via CPack/
          # install) is intentionally NOT done here. Wire that up when Windows
          # becomes a supported release target.
          if [[ -f build/pj_ffmpeg_bin_dirs.txt ]]; then
            while IFS= read -r _d; do
              [[ -n "$_d" ]] && export PATH="$(cygpath -u "$_d"):$PATH"
            done < build/pj_ffmpeg_bin_dirs.txt
          fi
          # --timeout kills any single test after 2 min so a deadlocked test
          # fails loudly with its name in the log instead of stalling the job.
          ctest --test-dir build --build-config RelWithDebInfo --output-on-failure --timeout 120
