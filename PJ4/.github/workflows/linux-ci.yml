name: Linux CI

on:
  pull_request:
    branches: [main, development]
    types: [opened, synchronize, reopened, ready_for_review]
  push:
    branches: [main, development]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  pre-commit:
    if: github.event.pull_request.draft == false
    uses: ./.github/workflows/pre-commit.yml
    permissions:
      contents: read

  build:
    if: github.event.pull_request.draft == false
    needs: pre-commit
    runs-on: ubuntu-22.04
    # Backstop against hangs (a deadlocked test otherwise holds the runner for
    # GitHub's 6-hour default). Worst observed legitimate run — cold Conan +
    # cold ccache — is ~28 min.
    timeout-minutes: 60
    permissions:
      contents: read
      packages: write   # push/pull the Conan cache OCI artifact on ghcr.io

    steps:
      - name: Use HTTPS for github.com submodules
        run: git config --global url."https://github.com/".insteadOf "git@github.com:"

      - uses: actions/checkout@v6
        with:
          submodules: recursive

      - uses: conan-io/setup-conan@v1
        with:
          # Backed by ghcr.io via oras (see steps below) instead of
          # actions/cache (10 GB soft cap, 7-day eviction, branch-scoped).
          # ghcr.io public repos: unlimited storage, tags survive forever,
          # cross-branch.
          cache_packages: false

      - name: Setup oras (OCI Registry As Storage)
        # Primary install path. continue-on-error so a 5xx on the github.com
        # release CDN doesn't kill CI — we have a fallback below, and worst
        # case we degrade to "no Conan cache this run" (build still completes).
        id: setup_oras
        uses: oras-project/setup-oras@v1
        continue-on-error: true

      - name: Setup oras (manual download fallback)
        id: setup_oras_fallback
        if: steps.setup_oras.outcome == 'failure'
        continue-on-error: true
        shell: bash
        run: |
          set -euo pipefail
          version="1.3.0"
          url="https://github.com/oras-project/oras/releases/download/v${version}/oras_${version}_linux_amd64.tar.gz"
          tarball="${RUNNER_TEMP}/oras.tar.gz"
          install_dir="${RUNNER_TEMP}/oras-bin"
          mkdir -p "${install_dir}"

          attempts=0
          until curl -fsSL "${url}" -o "${tarball}"; do
            attempts=$((attempts + 1))
            if [ "${attempts}" -ge 5 ]; then
              echo "Download failed after ${attempts} attempts" >&2
              exit 1
            fi
            delay=$((5 * (2 ** attempts)))
            echo "Download attempt ${attempts} failed; retrying in ${delay}s..."
            sleep "${delay}"
          done
          tar -xzf "${tarball}" -C "${install_dir}"
          echo "${install_dir}" >> "${GITHUB_PATH}"
          "${install_dir}/oras" version

      - name: Compute Conan cache tag
        id: conan_cache
        shell: bash
        run: |
          set -euo pipefail
          # Hash every conanfile.txt under the tree (today the top-level
          # one; future submodules under PJ4 may add their own) so the
          # key invalidates when any of them changes.
          hash=$(find . -name conanfile.txt -not -path './build/*' -not -path './.git/*' \
                  -print0 | sort -z | xargs -0 sha256sum | sha256sum | cut -c1-16)
          owner="${GITHUB_REPOSITORY_OWNER,,}"
          tag="ghcr.io/${owner}/pj4-conan-cache:linux-gcc-relwithdebinfo-${hash}"
          echo "hash=${hash}" >> "${GITHUB_OUTPUT}"
          echo "tag=${tag}" >> "${GITHUB_OUTPUT}"
          echo "Cache tag: ${tag}"

      - name: Login to ghcr.io
        if: github.repository_owner == 'PlotJuggler' && (steps.setup_oras.outcome == 'success' || steps.setup_oras_fallback.outcome == 'success')
        shell: bash
        env:
          GHCR_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          echo "${GHCR_TOKEN}" | oras login ghcr.io -u "${GITHUB_ACTOR}" --password-stdin

      - name: Restore Conan cache from ghcr.io
        if: github.repository_owner == 'PlotJuggler' && (steps.setup_oras.outcome == 'success' || steps.setup_oras_fallback.outcome == 'success')
        shell: bash
        run: |
          set +e
          tag="${{ steps.conan_cache.outputs.tag }}"
          pull_dir="${RUNNER_TEMP}/conan-cache-pull"
          mkdir -p "${pull_dir}"
          (
            cd "${pull_dir}"
            oras pull "${tag}" 2>&1
          )
          pulled=$?
          tarball="${pull_dir}/conan-cache.tar.zst"
          if [ "${pulled}" -eq 0 ] && [ -f "${tarball}" ]; then
            echo "Cache HIT: extracting ${tarball}"
            mkdir -p "${HOME}/.conan2"
            tar --zstd -xf "${tarball}" -C "${HOME}"
            echo "CONAN_CACHE_HIT=1" >> "${GITHUB_ENV}"
          else
            echo "Cache MISS for ${tag} (cold start or first build of this conanfile)"
          fi
          # Always exit 0 — a missing tag is not a CI failure.
          exit 0

      - name: Restore Conan cache from GitHub Actions cache
        # Fallback layer under the ghcr.io cache above. ghcr.io only restores on
        # the canonical PlotJuggler repo (it needs the registry token) and only
        # *saves* on push-to-main, so PRs that touch conanfile.txt — and every
        # build on a fork — get a ghcr.io MISS and rebuild all third-party deps
        # (~6.5 min: libiconv, lz4, zstd, ffmpeg, …) from source on every run.
        # The native Actions cache fills that gap: it works on PRs and forks with
        # no token, so a PR's 2nd+ run (and any PR rebased on a main that already
        # primed this key) restores the built packages instead of recompiling.
        # Skipped when ghcr.io already produced a HIT — ~/.conan2 is populated.
        id: conan-gha-cache
        if: env.CONAN_CACHE_HIT != '1'
        uses: actions/cache/restore@v5
        with:
          path: ~/.conan2
          key: conan-linux-gcc-relwithdebinfo-${{ steps.conan_cache.outputs.hash }}
          # Partial reuse when conanfile.txt changes: an older closure for the
          # same OS/compiler still seeds most packages, so only the changed dep
          # (and its dependents) rebuild rather than the whole graph.
          restore-keys: |
            conan-linux-gcc-relwithdebinfo-

      - name: Cache Qt
        id: qt-cache
        uses: actions/cache@v5
        with:
          path: .qt
          key: qt-6.8.3-linux-gcc_64-qtcharts-qtwebsockets

      - name: Install Qt 6.8.3 via aqt
        if: steps.qt-cache.outputs.cache-hit != 'true'
        run: |
          pip install aqtinstall
          aqt install-qt linux desktop 6.8.3 linux_gcc_64 \
            --modules qtcharts qtwebsockets --outputdir ./.qt

      - name: Install Qt 6 + FFmpeg VAAPI system dependencies
        run: |
          sudo apt-get update
          # libva-dev / libdrm-dev are required by the FFmpeg Conan build:
          # with_vaapi=True pulls vaapi/system, whose package_info resolves libva
          # and libva-drm via pkg-config — they must exist on the build host.
          sudo apt-get install -y \
            libgl1-mesa-dev libegl1-mesa-dev libxkbcommon-dev \
            libxcb-cursor0 libxcb-icccm4 libxcb-image0 libxcb-keysyms1 \
            libxcb-randr0 libxcb-render-util0 libxcb-shape0 libxcb-xinerama0 \
            libxcb-xkb1 libxkbcommon-x11-0 libfontconfig1 libdbus-1-3 \
            libva-dev libdrm-dev \
            xvfb ccache zstd

      - name: Configure ccache
        # Compiler-output cache for our own C++ — complementary to the Conan
        # cache (which holds prebuilt third-party packages, not our objects).
        uses: actions/cache@v5
        with:
          path: ~/.cache/ccache
          key: ccache-linux-${{ github.ref_name }}-${{ github.sha }}
          restore-keys: |
            ccache-linux-${{ github.ref_name }}-
            ccache-linux-

      - name: Set ccache limits
        run: |
          ccache --set-config=max_size=500M
          ccache --set-config=compression=true
          ccache -z

      - name: Build
        run: ./build.sh

      - name: Save Conan cache to ghcr.io
        # Only push from the canonical repo on real pushes (forks lack write
        # access to ghcr.io packages). Skip on cache HIT — the tag content is
        # already up to date, no point re-uploading the same bytes.
        if: github.event_name == 'push' && github.repository == 'PlotJuggler/PJ4' && env.CONAN_CACHE_HIT != '1' && (steps.setup_oras.outcome == 'success' || steps.setup_oras_fallback.outcome == 'success')
        shell: bash
        run: |
          set -euo pipefail
          tag="${{ steps.conan_cache.outputs.tag }}"
          tarball="${RUNNER_TEMP}/conan-cache.tar.zst"

          # Trim build trees before packing so the uploaded artifact only
          # contains the package binaries consumers actually need.
          conan cache clean "*" --build --source --temp

          echo "Packing ~/.conan2 -> ${tarball}"
          tar --zstd -cf "${tarball}" -C "${HOME}" .conan2

          size_mb=$(du -m "${tarball}" | cut -f1)
          echo "Compressed cache size: ${size_mb} MB"

          (
            cd "${RUNNER_TEMP}"
            oras push "${tag}" "conan-cache.tar.zst:application/vnd.oci.image.layer.v1.tar+zstd"
          )

      - name: Trim Conan cache before saving
        # Drop build/source/temp trees so only the package binaries consumers
        # need are persisted (matches the ghcr.io save above). Runs only when
        # we're about to save a fresh GHA cache entry.
        if: always() && env.CONAN_CACHE_HIT != '1' && steps.conan-gha-cache.outputs.cache-hit != 'true'
        shell: bash
        run: conan cache clean "*" --build --source --temp || true

      - name: Save Conan cache to GitHub Actions cache
        # Persist the built closure under the exact conanfile hash so the next
        # run on this branch (or any branch keyed identically) restores it.
        # `always()` so a failing project compile still saves the third-party
        # deps that finished earlier — they're the expensive part. Skipped on a
        # ghcr.io HIT or an exact GHA-key hit: ~/.conan2 is already current, and
        # GHA cache keys are immutable so re-saving the same key is a no-op.
        if: always() && env.CONAN_CACHE_HIT != '1' && steps.conan-gha-cache.outputs.cache-hit != 'true'
        uses: actions/cache/save@v5
        with:
          path: ~/.conan2
          key: conan-linux-gcc-relwithdebinfo-${{ steps.conan_cache.outputs.hash }}

      - name: ccache stats
        if: success()
        run: ccache -s

      - name: Test
        # --timeout kills any single test after 2 min (the suite normally
        # finishes in well under that), so one deadlocked test fails loudly
        # with its name in the log instead of stalling the whole job.
        run: xvfb-run -a ctest --test-dir build --output-on-failure --timeout 120
