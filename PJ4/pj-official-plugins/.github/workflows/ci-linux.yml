name: CI Linux

on:
  workflow_dispatch:
  pull_request:
    branches: [main]
  push:
    branches: [main]

concurrency:
  group: ci-linux-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # Acquire plotjuggler_sdk ONCE per run and hand it to every build leg as a Conan
  # cache artifact. Cloudsmith is contacted only here (prebuilt-binary fast path); on
  # a cloudsmith failure (e.g. HTTP 402 bandwidth exceeded) ensure_core.sh builds core
  # from the pinned extern/plotjuggler_core submodule instead, so CI never hard-depends
  # on cloudsmith. This is what collapses the old ~21 per-run cloudsmith pulls to 1.
  acquire-core:
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install Conan
        uses: conan-io/setup-conan@v1.3.0
        with:
          cache_packages: true

      - name: Install cmake and ninja
        run: pip install cmake ninja

      - name: Configure plotjuggler cloudsmith Conan remote
        env:
          CLOUDSMITH_USER: ${{ secrets.CLOUDSMITH_USER }}
          CLOUDSMITH_API_KEY: ${{ secrets.CLOUDSMITH_API_KEY }}
        shell: bash
        run: |
          conan profile detect --force
          conan remote add plotjuggler-cloudsmith \
            https://conan.cloudsmith.io/plotjuggler/plotjuggler --force
          # Non-fatal: if cloudsmith is down or over quota (HTTP 402), ensure_core.sh
          # below still builds core from the submodule, so don't fail the job here.
          conan remote login plotjuggler-cloudsmith \
            "$CLOUDSMITH_USER" -p "$CLOUDSMITH_API_KEY" \
            || echo "::warning::cloudsmith login failed; core will be built from the submodule"

      - name: Acquire plotjuggler_sdk (cloudsmith → submodule fallback)
        shell: bash
        run: scripts/ensure_core.sh

      - name: Save plotjuggler_sdk to a Conan cache artifact
        # Pin to the exact SDK_VERSION so a stale plotjuggler_sdk left in the
        # setup-conan package cache can never be shipped in the artifact.
        shell: bash
        run: conan cache save "plotjuggler_sdk/$(cat SDK_VERSION):*" --file core-cache.tgz

      - name: Upload core cache artifact
        uses: actions/upload-artifact@v4
        with:
          name: conan-core-cache
          path: core-cache.tgz
          if-no-files-found: error
          retention-days: 1

  # Build every Arrow variant the repo needs from source ONCE per run and hand them to
  # the arrow-consuming plugins as a Conan cache artifact, instead of compiling Arrow
  # (and its heavy boost / grpc / protobuf deps) independently in each arrow plugin's
  # leg. conancenter has no prebuilt binary for our profile — the repo forces
  # compiler.cppstd=20 globally and Conan 2 cannot give Arrow a different cppstd than the
  # consumer — so Arrow always builds from source.
  #
  # Two variants are primed, because Arrow's package_id depends on its options:
  #   * parquet/snappy  — shared by data_load_parquet + data_load_lerobot (~14 min)
  #   * +Flight/grpc/protobuf — used by toolbox_mosaico's Arrow Flight client (~50 min)
  # Both land in the one "*:*" artifact below; each build leg restores it and Conan picks
  # the matching package_id. Adding the Flight variant here (vs letting mosaico rebuild
  # it every run) costs nothing on warm runs and no extra wall-clock on cold runs —
  # mosaico already had to wait for this job, then built Flight in-leg anyway.
  #
  # The builds run in an ISOLATED CONAN_HOME so the saved closure is exactly Arrow + its
  # from-source deps and can never fold in a stale plotjuggler_sdk from the shared
  # setup-conan cache. A precisely-keyed actions/cache skips even these builds on warm
  # runs (GitHub cache keys are immutable, so the key encodes the exact Arrow config).
  acquire-arrow:
    runs-on: ubuntu-22.04
    env:
      CONAN_HOME: ${{ github.workspace }}/.conan-arrow
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Conan
        uses: conan-io/setup-conan@v1.3.0
        with:
          # We manage our own precisely-keyed cache below; the coarse shared
          # setup-conan key would only pollute the isolated home.
          cache_packages: false

      - name: Install cmake and ninja
        run: pip install cmake ninja

      - name: Restore the Arrow build cache
        id: arrow-cache
        uses: actions/cache@v4
        with:
          path: ${{ github.workspace }}/.conan-arrow
          # Bump the trailing -vN whenever either Arrow option set below changes, so a
          # stale immutable entry can't pin an old binary.
          key: conan-arrow-23.0.1-cppstd20-parquet-flight-${{ runner.os }}-v2

      - name: Build the Arrow variants (no-op on a cache hit)
        shell: bash
        # Each variant's options MUST match the consuming recipe's default_options so the
        # resulting package_id is identical and the build legs reuse the binary (verified
        # with `conan graph info`: parquet/lerobot share one id, mosaico's Flight build
        # another).
        run: |
          conan profile detect --force
          # Variant 1 — parquet/snappy (data_load_parquet, data_load_lerobot).
          conan install --requires=arrow/23.0.1 \
            -o "arrow/*:parquet=True" -o "arrow/*:with_snappy=True" \
            -o "*:shared=False" \
            -o "boost/*:without_test=True" -o "boost/*:without_cobalt=True" \
            -s build_type=Release -s compiler.cppstd=20 \
            -c tools.cmake.cmaketoolchain:generator=Ninja \
            --build=missing -of "$(mktemp -d)"
          # Variant 2 — Arrow Flight (toolbox_mosaico). Pulls grpc + protobuf + re2 +
          # thrift; lz4/zstd are needed because the Mosaico server sends LZ4/ZSTD batches.
          conan install --requires=arrow/23.0.1 \
            -o "arrow/*:parquet=True" -o "arrow/*:with_snappy=True" \
            -o "arrow/*:with_flight_rpc=True" -o "arrow/*:with_grpc=True" \
            -o "arrow/*:with_protobuf=True" -o "arrow/*:with_re2=True" \
            -o "arrow/*:with_thrift=True" \
            -o "arrow/*:with_lz4=True" -o "arrow/*:with_zstd=True" \
            -o "*:shared=False" \
            -o "boost/*:without_test=True" -o "boost/*:without_cobalt=True" \
            -s build_type=Release -s compiler.cppstd=20 \
            -c tools.cmake.cmaketoolchain:generator=Ninja \
            --build=missing -of "$(mktemp -d)"

      - name: Pack the Arrow closure for the build legs
        shell: bash
        # The isolated home holds only Arrow's closure (incl. boost), never
        # plotjuggler_sdk, so saving everything is both safe and complete.
        run: conan cache save "*:*" --file "$GITHUB_WORKSPACE/arrow-cache.tgz"

      - name: Upload Arrow cache artifact
        uses: actions/upload-artifact@v4
        with:
          name: conan-arrow-cache
          path: arrow-cache.tgz
          if-no-files-found: error
          retention-days: 1

  # Emit the matrix list of plugins to build in isolation. A plugin is
  # included when it has its own conanfile.py and a manifest.json, and does
  # not provide a release.sh (release.sh-driven plugins, e.g. data_stream_ros2,
  # have their own dedicated workflow).
  discover-plugins:
    runs-on: ubuntu-22.04
    outputs:
      plugins: ${{ steps.list.outputs.plugins }}
      arrow_plugins: ${{ steps.list.outputs.arrow_plugins }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: List plugins
        id: list
        shell: bash
        # Partition into Arrow consumers and the rest. The Arrow consumers build in a
        # dedicated job (arrow-plugin-build) that reuses a once-built Arrow binary from
        # acquire-arrow, while everyone else builds immediately after acquire-core. The
        # split is by recipe content (grep "arrow/"), so a new Arrow plugin is routed
        # automatically with no workflow edit. acquire-arrow primes the variants the repo
        # needs (parquet/snappy + Flight); a plugin requesting some other Arrow variant
        # still works — it just rebuilds that variant in-leg until acquire-arrow primes it
        # too.
        run: |
          plugins=()
          arrow_plugins=()
          for d in */conanfile.py; do
            plugin=$(dirname "$d")
            [[ -f "$plugin/release.sh" ]] && continue
            [[ -f "$plugin/manifest.json" ]] || continue
            if grep -q '"arrow/' "$d"; then
              arrow_plugins+=("$plugin")
            else
              plugins+=("$plugin")
            fi
          done
          json=$(printf '%s\n' "${plugins[@]}" | jq -R . | jq -sc .)
          if [[ ${#arrow_plugins[@]} -gt 0 ]]; then
            arrow_json=$(printf '%s\n' "${arrow_plugins[@]}" | jq -R . | jq -sc .)
          else
            arrow_json='[]'
          fi
          echo "plugins=$json" >> "$GITHUB_OUTPUT"
          echo "arrow_plugins=$arrow_json" >> "$GITHUB_OUTPUT"
          echo "Discovered plugins: $json"
          echo "Discovered Arrow plugins: $arrow_json"

  # Build each plugin in isolation against its own conanfile.py, matching the
  # path the release workflow takes. Catches per-plugin recipe gaps. Each leg
  # restores plotjuggler_sdk from the acquire-core artifact (no cloudsmith remote
  # is configured here), so the matrix fan-out costs zero cloudsmith bandwidth;
  # conancenter still serves each plugin's other third-party deps.
  per-plugin-build:
    needs: [discover-plugins, acquire-core]
    runs-on: ubuntu-22.04
    strategy:
      fail-fast: false
      matrix:
        plugin: ${{ fromJson(needs.discover-plugins.outputs.plugins) }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install Conan
        uses: conan-io/setup-conan@v1.3.0
        with:
          cache_packages: true

      - name: Install cmake and ninja
        run: pip install cmake ninja

      - name: Detect Conan profile
        shell: bash
        run: conan profile detect --force

      - name: Download core cache artifact
        uses: actions/download-artifact@v4
        with:
          name: conan-core-cache

      - name: Restore plotjuggler_sdk into the Conan cache
        # Core comes from the artifact primed by acquire-core. No cloudsmith remote is
        # configured in this job, so a build leg can never pull core from cloudsmith.
        # If the restore somehow misses, ensure_core.sh rebuilds it from the submodule.
        shell: bash
        run: conan cache restore core-cache.tgz || scripts/ensure_core.sh

      - name: Build ${{ matrix.plugin }}
        shell: bash
        run: ./build.sh "${{ matrix.plugin }}"

      - name: Test ${{ matrix.plugin }}
        shell: bash
        run: ctest --test-dir "build/${{ matrix.plugin }}/Release" --output-on-failure -V

      # Emit this plugin's status badge JSON (version from manifest, color from
      # this leg's outcome) and hand it to the update-badges job as an artifact.
      # `always()` so a failed build still reports red instead of going stale.
      - name: Write status badge JSON
        if: always()
        shell: bash
        run: |
          python3 scripts/write_badge_json.py \
            --plugin "${{ matrix.plugin }}" \
            --status "${{ job.status }}" \
            --out-dir badge-out

      - name: Upload status badge JSON
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: badge-${{ matrix.plugin }}
          path: badge-out/${{ matrix.plugin }}.json
          if-no-files-found: error
          retention-days: 1

  # Build the Arrow-consuming plugins (data_load_parquet, data_load_lerobot, …) as
  # parallel matrix legs that restore the once-built Arrow closure from acquire-arrow,
  # so Arrow + boost are compiled exactly once per run instead of once per arrow plugin.
  # Identical to per-plugin-build apart from the extra acquire-arrow dependency and the
  # arrow-cache restore; each plugin is still `conan install`ed against its own recipe,
  # so per-plugin recipe-gap detection is preserved (only built binaries are shared).
  arrow-plugin-build:
    needs: [discover-plugins, acquire-core, acquire-arrow]
    runs-on: ubuntu-22.04
    strategy:
      fail-fast: false
      matrix:
        plugin: ${{ fromJson(needs.discover-plugins.outputs.arrow_plugins) }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install Conan
        uses: conan-io/setup-conan@v1.3.0
        with:
          cache_packages: true

      - name: Install cmake and ninja
        run: pip install cmake ninja

      - name: Detect Conan profile
        shell: bash
        run: conan profile detect --force

      - name: Download core cache artifact
        uses: actions/download-artifact@v4
        with:
          name: conan-core-cache

      - name: Download Arrow cache artifact
        uses: actions/download-artifact@v4
        with:
          name: conan-arrow-cache

      - name: Restore plotjuggler_sdk and Arrow into the Conan cache
        # Core comes from acquire-core, Arrow (+ boost) from acquire-arrow. With the
        # Arrow binary present at a matching package_id, build.sh's `--build=missing`
        # reuses it instead of recompiling. ensure_core.sh covers a rare core-restore
        # miss; an Arrow-restore miss simply falls back to building Arrow in this leg.
        shell: bash
        run: |
          conan cache restore core-cache.tgz || scripts/ensure_core.sh
          conan cache restore arrow-cache.tgz || true

      - name: Build ${{ matrix.plugin }}
        shell: bash
        run: ./build.sh "${{ matrix.plugin }}"

      - name: Test ${{ matrix.plugin }}
        shell: bash
        run: ctest --test-dir "build/${{ matrix.plugin }}/Release" --output-on-failure -V

      - name: Write status badge JSON
        if: always()
        shell: bash
        run: |
          python3 scripts/write_badge_json.py \
            --plugin "${{ matrix.plugin }}" \
            --status "${{ job.status }}" \
            --out-dir badge-out

      - name: Upload status badge JSON
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: badge-${{ matrix.plugin }}
          path: badge-out/${{ matrix.plugin }}.json
          if-no-files-found: error
          retention-days: 1

  # Publish per-plugin status badges (version + green/red) to the orphan
  # `badges` branch that the README's shields.io endpoint badges read. Funnels
  # every matrix leg's artifact into a single committer so the parallel legs
  # never race on `git push`. Runs only on pushes to main, so badges track
  # main's health rather than in-flight PRs; `always()` so red builds still
  # publish a red badge.
  update-badges:
    name: update status badges
    needs: [discover-plugins, per-plugin-build, arrow-plugin-build]
    if: ${{ always() && github.event_name == 'push' && github.ref == 'refs/heads/main' }}
    runs-on: ubuntu-22.04
    permissions:
      contents: write
    concurrency:
      group: badges-branch
      cancel-in-progress: false
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download badge JSON artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: badge-*
          path: badge-out
          merge-multiple: true

      - name: Publish badges
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: scripts/publish_badges.sh badge-out
