name: CI macOS

on:
  workflow_dispatch:
  pull_request:
    branches: [main]
  push:
    branches: [main]

concurrency:
  group: ci-macos-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: macos-15-intel

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install Conan
        uses: conan-io/setup-conan@v1.3.0
        with:
          cache_packages: true

      - name: Install cmake and ninja
        run: pip install cmake ninja

      - name: Acquire plotjuggler_sdk
        # Cloudsmith publishes only a Linux binary, so macOS always builds core from
        # source. ensure_core.sh builds it from the pinned extern/plotjuggler_core
        # submodule with no cloudsmith remote configured, so a cloudsmith outage can
        # never break the macOS build (and the recipe-revision races that motivated
        # the old `--update` flag are gone — the submodule is the source of truth).
        shell: bash
        run: |
          conan profile detect --force
          scripts/ensure_core.sh

      - name: Build & Test
        shell: bash
        run: |
          conan install . --output-folder=build --build=missing -s build_type=Release \
            -s compiler.cppstd=20 -c tools.cmake.cmaketoolchain:generator=Ninja

          cmake -S . -B build/Release -G Ninja \
            -DCMAKE_TOOLCHAIN_FILE=build/conan_toolchain.cmake \
            -DCMAKE_PREFIX_PATH=build \
            -DCMAKE_BUILD_TYPE=Release
          cmake --build build/Release --config Release
          ctest --test-dir build/Release -V --output-on-failure
