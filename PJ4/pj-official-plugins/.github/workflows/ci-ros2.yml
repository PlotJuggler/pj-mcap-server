name: CI ROS2 Plugin

on:
  workflow_dispatch:
  pull_request:
    branches: [main]
    paths:
      - 'data_stream_ros2/**'
      - '.github/workflows/ci-ros2.yml'
      - 'CMakeLists.txt'
      - 'cmake/**'
  push:
    branches: [main]
    paths:
      - 'data_stream_ros2/**'
      - '.github/workflows/ci-ros2.yml'

concurrency:
  group: ci-ros2-${{ github.ref }}
  cancel-in-progress: true

# End-to-end build for the ROS 2 subscriber marketplace extension:
#
#  - `build-distro` runs a matrix across every supported ROS 2 distribution
#    inside the corresponding osrf/ros Docker image. Each job builds
#    plotjuggler_sdk from the pinned extern/plotjuggler_core submodule and links
#    the resulting distro-specific shared library against that distro's
#    rclcpp.
#
#  - `build-proxy` builds the dispatch proxy once on a plain Ubuntu runner,
#    because it has no dependency on ROS itself. The proxy detects the ROS
#    distro on the user's machine at load time and dlopen-s the matching
#    per-distro binary.
#
#  - `package-extension` assembles both into a single marketplace zip with
#    the proxy at the root and one .so per distro under `dist/<distro>/`.
jobs:
  build-distro:
    name: distro / ${{ matrix.distro }} (${{ matrix.ubuntu }})
    runs-on: ubuntu-22.04
    strategy:
      fail-fast: false
      matrix:
        include:
          - distro: humble
            ubuntu: 22.04
            image: osrf/ros:humble-desktop
          - distro: iron
            ubuntu: 22.04
            image: osrf/ros:iron-desktop
          - distro: jazzy
            ubuntu: 24.04
            image: osrf/ros:jazzy-desktop
          - distro: rolling
            ubuntu: 24.04
            image: osrf/ros:rolling-desktop

    container:
      image: ${{ matrix.image }}

    steps:
      - name: Install system build dependencies
        shell: bash
        run: |
          apt-get update
          apt-get install -y --no-install-recommends \
            cmake ninja-build git python3-pip \
            nlohmann-json3-dev

      - name: Install Conan 2.x
        shell: bash
        run: |
          pip install --break-system-packages "conan>=2.0,<3" || pip install "conan>=2.0,<3"
          conan --version

      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Acquire plotjuggler_sdk (submodule build; no cloudsmith)
        shell: bash
        run: |
          conan profile detect --force
          scripts/ensure_core.sh

      - name: Configure and build distro
        shell: bash
        run: |
          source /opt/ros/${{ matrix.distro }}/setup.bash

          # Plugin-local recipe (plotjuggler_sdk + gtest + nlohmann_json),
          # not the repo-root conanfile.py that pulls every plugin's deps.
          conan install data_stream_ros2 --output-folder=build --build=missing \
            -s build_type=Release \
            -s compiler.cppstd=20 \
            -c tools.cmake.cmaketoolchain:generator=Ninja

          cmake -S . -B build/Release -G Ninja \
            -DCMAKE_TOOLCHAIN_FILE=build/conan_toolchain.cmake \
            -DCMAKE_PREFIX_PATH="build;/opt/ros/${{ matrix.distro }}" \
            -DCMAKE_BUILD_TYPE=Release \
            -DPJ_BUILD_PLUGIN=data_stream_ros2 \
            -DPJ_BUILD_ROS2_DISTRO=ON

          cmake --build build/Release --config Release

      - name: Upload distro artifact
        uses: actions/upload-artifact@v4
        with:
          name: ros2-distro-${{ matrix.distro }}
          path: build/Release/bin/libros2_stream_plugin-${{ matrix.distro }}.so
          if-no-files-found: error

  build-proxy:
    name: proxy (no ROS)
    runs-on: ubuntu-22.04

    steps:
      - name: Install build dependencies
        shell: bash
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            cmake ninja-build git python3-pip

      - name: Install Conan 2.x
        shell: bash
        run: pip install "conan>=2.0,<3"

      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Acquire plotjuggler_sdk (submodule build; no cloudsmith)
        shell: bash
        run: |
          conan profile detect --force
          scripts/ensure_core.sh

      - name: Configure and build proxy
        shell: bash
        run: |
          # Plugin-local recipe (plotjuggler_sdk + gtest + nlohmann_json),
          # not the repo-root conanfile.py that pulls every plugin's deps.
          conan install data_stream_ros2 --output-folder=build --build=missing \
            -s build_type=Release \
            -s compiler.cppstd=20 \
            -c tools.cmake.cmaketoolchain:generator=Ninja

          cmake -S . -B build/Release -G Ninja \
            -DCMAKE_TOOLCHAIN_FILE=build/conan_toolchain.cmake \
            -DCMAKE_PREFIX_PATH=build \
            -DCMAKE_BUILD_TYPE=Release \
            -DPJ_BUILD_PLUGIN=data_stream_ros2

          cmake --build build/Release --config Release

      - name: Upload proxy artifact
        uses: actions/upload-artifact@v4
        with:
          name: ros2-proxy
          path: build/Release/bin/libros2_stream_plugin.so
          if-no-files-found: error

  package-extension:
    name: package marketplace zip
    needs: [build-distro, build-proxy]
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download proxy artifact
        uses: actions/download-artifact@v4
        with:
          name: ros2-proxy
          path: stage/

      - name: Download distro humble
        uses: actions/download-artifact@v4
        with:
          name: ros2-distro-humble
          path: stage/dist/

      - name: Download distro iron
        uses: actions/download-artifact@v4
        with:
          name: ros2-distro-iron
          path: stage/dist/

      - name: Download distro jazzy
        uses: actions/download-artifact@v4
        with:
          name: ros2-distro-jazzy
          path: stage/dist/

      - name: Download distro rolling
        uses: actions/download-artifact@v4
        with:
          name: ros2-distro-rolling
          path: stage/dist/

      - name: Copy manifest alongside proxy
        shell: bash
        run: |
          cp data_stream_ros2/manifest.json stage/manifest.json

      - name: Show final zip layout
        shell: bash
        run: |
          find stage -type f | sort

      - name: Create extension zip
        shell: bash
        run: |
          cd stage
          zip -r ../ros2_subscriber-linux-x86_64.zip .

      - name: Upload assembled extension
        uses: actions/upload-artifact@v4
        with:
          name: ros2_subscriber-marketplace-zip
          path: ros2_subscriber-linux-x86_64.zip
          if-no-files-found: error

  # Publish the data_stream_ros2 status badge to the shared `badges` branch.
  # This plugin is built only by this workflow (not the CI Linux per-plugin
  # matrix), so its badge is owned here. Color aggregates the distro matrix and
  # the proxy build. Shares the `badges-branch` concurrency group with CI Linux
  # so the two workflows serialize their pushes to the badges branch.
  update-badge:
    name: update status badge
    needs: [build-distro, build-proxy]
    if: ${{ always() && github.event_name == 'push' && github.ref == 'refs/heads/main' }}
    runs-on: ubuntu-22.04
    permissions:
      contents: write
    concurrency:
      group: badges-branch
      cancel-in-progress: false
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Determine aggregate status
        id: status
        shell: bash
        run: |
          distro='${{ needs.build-distro.result }}'
          proxy='${{ needs.build-proxy.result }}'
          if [[ "$distro" == "success" && "$proxy" == "success" ]]; then
            echo "result=success" >> "$GITHUB_OUTPUT"
          else
            echo "result=failure" >> "$GITHUB_OUTPUT"
          fi

      - name: Write status badge JSON
        shell: bash
        run: |
          python3 scripts/write_badge_json.py \
            --plugin data_stream_ros2 \
            --status "${{ steps.status.outputs.result }}" \
            --out-dir badge-out

      - name: Publish badge
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: scripts/publish_badges.sh badge-out
