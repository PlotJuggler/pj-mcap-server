name: Build & Release

on:
  workflow_dispatch:
  push:
    tags: ['*/v*']
  schedule:
    # Keep the full-build Conan cache warm — runs weekly (cache expires after 7 days of no access)
    - cron: '0 3 * * 1'  # Monday 3am UTC

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: ubuntu-22.04
            arch: x86_64
            os_label: linux
            lib_ext: so
          - runner: ubuntu-22.04-arm
            arch: aarch64
            os_label: linux
            lib_ext: so
          - runner: macos-15-intel
            arch: x86_64
            os_label: macos
            lib_ext: dylib
          - runner: macos-14
            arch: arm64
            os_label: macos
            lib_ext: dylib
          # Pinned to windows-2022: see ci-windows.yml — the VS18/MSVC 14.5x image
          # breaks the libsodium/1.0.20 build (MSB8052, toolset 14.44 vs v145).
          # windows-11-arm below is left as-is (the failure is x64-toolset-specific).
          - runner: windows-2022
            arch: x64
            os_label: windows
            lib_ext: dll
          - runner: windows-11-arm
            arch: arm64
            os_label: windows
            lib_ext: dll

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Resolve build scope
        id: build-scope
        shell: bash
        run: |
          python3 scripts/release_tools.py resolve-build-scope \
            --tag "${GITHUB_REF_NAME:-}" \
            --tag-type "${GITHUB_REF_TYPE:-}" \
            --os-label "${{ matrix.os_label }}" \
            --arch "${{ matrix.arch }}" \
            >> "${GITHUB_OUTPUT}"

      - name: Install Conan
        id: setup-conan
        uses: conan-io/setup-conan@v1.3.0

      - name: Restore Conan package cache
        uses: actions/cache@v4
        with:
          path: ${{ steps.setup-conan.outputs.conan-home }}/p
          key: conan-${{ steps.setup-conan.outputs.conan-version }}-${{ runner.os }}-${{ matrix.arch }}-${{ steps.build-scope.outputs.scope }}-${{ steps.build-scope.outputs.conan_hash }}
          restore-keys: |
            conan-${{ steps.setup-conan.outputs.conan-version }}-${{ runner.os }}-${{ matrix.arch }}-${{ steps.build-scope.outputs.scope }}-

      - name: Install cmake and ninja
        run: pip install cmake ninja

      - name: Configure plotjuggler cloudsmith Conan remote
        # plotjuggler_sdk is consumed from the plotjuggler cloudsmith Conan
        # repo. Configured before build.sh runs `conan install`.
        env:
          CLOUDSMITH_USER: ${{ secrets.CLOUDSMITH_USER }}
          CLOUDSMITH_API_KEY: ${{ secrets.CLOUDSMITH_API_KEY }}
        shell: bash
        run: |
          conan profile detect --force
          conan remote add plotjuggler-cloudsmith \
            https://conan.cloudsmith.io/plotjuggler/plotjuggler --force
          conan remote login plotjuggler-cloudsmith \
            "$CLOUDSMITH_USER" -p "$CLOUDSMITH_API_KEY"

      - name: Set up MSVC environment (Windows)
        if: runner.os == 'Windows'
        uses: ilammy/msvc-dev-cmd@v1
        with:
          arch: ${{ matrix.arch }}

      - name: Build & Test
        if: steps.build-scope.outputs.skip != 'true'
        shell: bash
        run: |
          if [[ "${{ steps.build-scope.outputs.use_release_override }}" == "true" ]]; then
            "./${{ steps.build-scope.outputs.plugin_name }}/release.sh"
          else
            ./build.sh ${{ steps.build-scope.outputs.build_script_args }}
            ctest --test-dir "${{ steps.build-scope.outputs.build_dir }}" -V --output-on-failure
          fi

      - name: Verify plugin version
        if: startsWith(github.ref, 'refs/tags/') && steps.build-scope.outputs.skip != 'true'
        shell: bash
        run: |
          python3 scripts/release_tools.py verify-version-consistency \
            --release-tag "${{ github.ref_name }}" \
            --build-dir "${{ steps.build-scope.outputs.build_dir }}" \
            --check-manifest

      - name: Package artifacts
        if: startsWith(github.ref, 'refs/tags/') && steps.build-scope.outputs.skip != 'true'
        shell: bash
        run: |
          ZIP_NAME=$(python3 scripts/release_tools.py create-distribution-package \
            --release-tag "${{ github.ref_name }}" \
            --build-dir "${{ steps.build-scope.outputs.build_dir }}" \
            --output-dir dist \
            --os-label "${{ matrix.os_label }}" \
            --arch "${{ matrix.arch }}")

          echo "ZIP_NAME=${ZIP_NAME}" >> $GITHUB_ENV

      - name: Compress artifacts (Linux/macOS)
        if: startsWith(github.ref, 'refs/tags/') && runner.os != 'Windows' && steps.build-scope.outputs.skip != 'true'
        shell: bash
        run: cd dist && zip -r "../${{ env.ZIP_NAME }}" .

      - name: Compress artifacts (Windows)
        if: startsWith(github.ref, 'refs/tags/') && runner.os == 'Windows' && steps.build-scope.outputs.skip != 'true'
        shell: pwsh
        run: |
          Compress-Archive -Path dist\* -DestinationPath "$env:ZIP_NAME"
          Write-Host "Package created: $env:ZIP_NAME"

      - name: Generate checksum (Linux/macOS)
        if: startsWith(github.ref, 'refs/tags/') && runner.os != 'Windows' && steps.build-scope.outputs.skip != 'true'
        shell: bash
        run: |
          if command -v sha256sum &> /dev/null; then
            sha256sum "${{ env.ZIP_NAME }}" > "${{ env.ZIP_NAME }}.sha256"
          else
            shasum -a 256 "${{ env.ZIP_NAME }}" > "${{ env.ZIP_NAME }}.sha256"
          fi
          cat "${{ env.ZIP_NAME }}.sha256"

      - name: Generate checksum (Windows)
        if: startsWith(github.ref, 'refs/tags/') && runner.os == 'Windows' && steps.build-scope.outputs.skip != 'true'
        shell: pwsh
        run: |
          $hash = (Get-FileHash -Algorithm SHA256 "$env:ZIP_NAME").Hash.ToLower()
          "$hash  $env:ZIP_NAME" | Out-File -Encoding ascii "$env:ZIP_NAME.sha256"
          Get-Content "$env:ZIP_NAME.sha256"

      - name: Upload artifact
        if: startsWith(github.ref, 'refs/tags/') && steps.build-scope.outputs.skip != 'true'
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.ZIP_NAME }}
          path: ${{ env.ZIP_NAME }}

      - name: Generate release notes
        if: startsWith(github.ref, 'refs/tags/') && matrix.runner == 'ubuntu-22.04' && steps.build-scope.outputs.skip != 'true'
        shell: bash
        run: |
          git fetch --tags --force --unshallow || git fetch --tags --force
          python3 scripts/release_tools.py generate-release-notes \
            --release-tag "${{ github.ref_name }}" \
            --output release-notes.md

      - name: Upload to Release with notes
        if: startsWith(github.ref, 'refs/tags/') && matrix.runner == 'ubuntu-22.04' && steps.build-scope.outputs.skip != 'true'
        uses: softprops/action-gh-release@v2
        with:
          files: |
            ${{ env.ZIP_NAME }}
            ${{ env.ZIP_NAME }}.sha256
          body_path: release-notes.md
          fail_on_unmatched_files: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload to Release
        if: startsWith(github.ref, 'refs/tags/') && matrix.runner != 'ubuntu-22.04' && steps.build-scope.outputs.skip != 'true'
        uses: softprops/action-gh-release@v2
        with:
          files: |
            ${{ env.ZIP_NAME }}
            ${{ env.ZIP_NAME }}.sha256
          fail_on_unmatched_files: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # Submit to registry if tag metadata requests it
  submit-to-registry:
    needs: build
    if: success() && startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # Need full history for tag annotations

      - name: Fetch tags with annotations
        run: git fetch --tags --force

      - name: Check tag metadata
        id: check-tag
        run: |
          # Get tag annotation message (contains JSON metadata)
          # Use git cat-file to reliably get the tag message for annotated tags
          TAG_SHA=$(git rev-parse "refs/tags/${{ github.ref_name }}")
          TAG_TYPE=$(git cat-file -t "$TAG_SHA")

          if [ "$TAG_TYPE" = "tag" ]; then
            # Annotated tag - extract message (skip header lines, get body)
            TAG_MSG=$(git cat-file -p "$TAG_SHA" | sed -n '/^$/,$p' | tail -n +2)
          else
            # Lightweight tag - no message
            TAG_MSG="{}"
          fi

          echo "Tag type: $TAG_TYPE"
          echo "Tag message: $TAG_MSG"

          # Parse auto_submit_to_registry from JSON
          AUTO_SUBMIT=$(echo "$TAG_MSG" | python3 -c "import sys,json; d=json.loads(sys.stdin.read() or '{}'); print(str(d.get('auto_submit_to_registry', False)).lower())")
          echo "auto_submit=$AUTO_SUBMIT" >> $GITHUB_OUTPUT
          echo "Auto-submit to registry: $AUTO_SUBMIT"

      - name: Submit to registry
        if: steps.check-tag.outputs.auto_submit == 'true'
        env:
          GH_TOKEN: ${{ secrets.REGISTRY_PAT }}
        run: |
          # Extract source_dir from tag (data_load_csv/v1.0.5 -> data_load_csv)
          SOURCE_DIR="${GITHUB_REF_NAME%/*}"
          VERSION="${GITHUB_REF_NAME#*/v}"
          python3 scripts/release_tools.py generate-release-notes \
            --release-tag "${GITHUB_REF_NAME}" \
            --output release-notes.md
          echo "Submitting $SOURCE_DIR v$VERSION to registry..."
          python3 scripts/submit_to_registry.py "$SOURCE_DIR" \
            --version "$VERSION" \
            --release-notes release-notes.md \
            --skip-checksum-verify
